<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#0b1220; color:#e6edf3; margin:0; }
      .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
      .card { width:420px; background:#111a2e; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:22px; box-shadow: 0 20px 60px rgba(0,0,0,.45); }
      h1 { font-size:20px; margin:0 0 14px; }
      .muted { color: rgba(230,237,243,.75); font-size:13px; margin:0 0 16px; }
      label { display:block; font-size:13px; margin:12px 0 6px; color: rgba(230,237,243,.85); }
      input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.10); background:#0b1220; color:#e6edf3; outline:none; }
      input:focus { border-color: rgba(99, 102, 241, .65); box-shadow: 0 0 0 3px rgba(99, 102, 241, .15); }
      .row { display:flex; gap:10px; margin-top:16px; }
      button { width:100%; padding:10px 12px; border-radius:10px; border:0; background:#22c55e; color:#052e14; font-weight:700; cursor:pointer; }
      a.btn { display:inline-block; width:100%; text-align:center; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.12); color:#e6edf3; text-decoration:none; }
      .error { margin-top:12px; padding:10px 12px; border-radius:10px; background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.25); color:#fecaca; font-size:13px; }
      .toplinks { display:flex; justify-content:space-between; gap:10px; margin-top:10px; font-size:13px; }
      .toplinks a { color:#a5b4fc; text-decoration:none; }
      .toplinks a:hover { text-decoration:underline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Create account</h1>
        <p class="muted">Register, then you’ll be taken to the homepage.</p>

        <form method="post" action="/register">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required />

          <div class="row">
            <button type="submit">Register</button>
          </div>
        </form>

        <div class="toplinks">
          <a href="/login">Back to sign in</a>
          <span></span>
        </div>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
      </div>
    </div>
  </body>
</html>
